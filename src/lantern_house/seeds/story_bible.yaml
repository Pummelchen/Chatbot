locations:
  - slug: front-desk
    name: Front Desk
    description: "A narrow reception counter facing the lobby, with a buzzing card reader, a tea tray that keeps becoming a meeting point, and drawers full of unpaid invoices."
    public_facts:
      - "Everyone passing through the house eventually says too much at the desk."
      - "Ayu can make the lobby feel welcoming even when the power is blinking."
  - slug: salt-kitchen
    name: Salt Kitchen
    description: "A warm but cramped kitchen where staff meals, shared snacks, and dangerous conversations collect around the stove."
    public_facts:
      - "Recipes from five families are taped inside the same cabinet door."
      - "Private grief tends to become public in this kitchen after midnight."
  - slug: lantern-wing
    name: Sealed Lantern Wing
    description: "The locked upper corridor Evelyn sealed before vanishing, still smelling faintly of damp paper, candle wax, and sea varnish."
    public_facts:
      - "No one admits to hearing footsteps there during storms."
      - "The lantern room at the end of the corridor was Evelyn's private archive."
  - slug: roof-walk
    name: Roof Walk
    description: "A narrow roof path above the sea wall where cigarettes, phone calls, and almost-confessions happen after dark."
    public_facts:
      - "The roof amplifies every silence between two people who want different things."
      - "The harbor lights make the house look richer than it is."
  - slug: boiler-room
    name: Boiler Room
    description: "A basement service room of patched pipes, ferry crates, and one section of brick that looks newer than the rest."
    public_facts:
      - "Rafael knows every sound the boiler makes and notices new ones immediately."
      - "The basement layout never fully matches the public floor plan."
