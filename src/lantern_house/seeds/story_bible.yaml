      - "Find out what Amelia is hiding about Evelyn."
      - "Keep Arjun interesting without letting him get ahead of her."
  - slug: hana
    full_name: Hana Seo
    background: "Korean"
    public_persona: "The returning figure from the past whose control makes other people feel noisy, guilty, and slightly unprepared."
    hidden_wound: "She left Lantern House carrying blame for missing records after helping Evelyn with one secret errand she still has not fully explained."
    long_term_desire: "Clear her name and finish what Evelyn asked her to protect."
    private_fear: "Telling the whole truth will destroy the people she still has not managed to stop caring about."
    family_expectations: "She was taught to protect family reputation, master herself, and never make fear someone else's burden."
    conflict_style: "Controlled, exact, and devastatingly calm; she uses silence and timing as weapons."
    privacy_boundaries: "She will reveal facts before feelings and would rather look cold than needy."
    value_instincts: "Duty is costly, money is leverage, shame is remembered for years, and loyalty can survive distance but not contempt."
    emotional_expression: "She shows care through preparation and restraint, anger through ruthless clarity, restraint through silence, and attraction through protectiveness framed as strategy."
    message_style: "Composed, pared down, incisive, with emotion compressed into the choice of one line."
    ensemble_role: "Returning Figure from the Past"
    secrets_summary: "She did not return just to defend herself; she came back because someone is finally moving the wrong documents."
