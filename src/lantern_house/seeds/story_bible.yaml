characters:
  - slug: amelia
    full_name: Amelia Vale
    background: "Anglo (US/UK family line)"
    public_persona: "The practical house manager who keeps Lantern House operational, readable, and emotionally survivable for everyone else."
    hidden_wound: "She kept Evelyn's final voice memo because it named someone Amelia still cannot bear to betray."
    long_term_desire: "Keep Lantern House alive long enough to rebuild it on truth instead of emotional debt."
    private_fear: "If the full story comes out, she loses the house, Rafael, and the right to call herself its center."
    family_expectations: "The Vale side expects her to protect the family name, contain scandal, and never admit how badly the house is cornered."
    conflict_style: "She begins calm and managerial, then turns surgically blunt when pushed past fairness."
    privacy_boundaries: "She hates public vulnerability, refuses to name desire directly, and hides grief inside practical tasks."
    value_instincts: "Duty comes first, money means survival not status, loyalty is proven through action, and jealousy shows up as control."
    emotional_expression: "She shows care through competence, anger through clipped precision, restraint through overwork, and attraction through fierce protection."
    message_style: "Clear, steady, dry under pressure, emotionally economical until the mask slips."
    ensemble_role: "House Manager"
    secrets_summary: "Knows more about Evelyn's last hour than anyone realizes and has been deciding who deserves the truth."
    humor_style: "Deadpan understatement that lands hardest when the room is near panic."
    color: "bright_blue"
    current_location_slug: front-desk
    emotional_state:
      baseline: guarded
      current: stretched
      subtext: "Holding the room together by force of will."
    active_goals:
      - "Stop Blackwake from forcing a rushed sale."
      - "Keep Lucía from taking control before the records are clear."
      - "Prevent Hana and Rafael from connecting their versions of typhoon night."
