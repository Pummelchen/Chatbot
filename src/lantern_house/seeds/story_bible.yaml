    emotional_expression: "She shows care through advocacy, anger through polished blades, restraint through posture, and attraction through eye contact she refuses to break first."
    message_style: "Controlled, vivid, proud, and too intelligent to waste a threat."
    ensemble_role: "Family Claimant and Heir"
    secrets_summary: "She brought a copied codicil and one more family story than she is willing to admit out loud."
    humor_style: "Dry precision, class-aware wit, and occasional dramatic overkill used on purpose."
    color: "spring_green3"
    current_location_slug: front-desk
    emotional_state:
      baseline: composed
      current: braced
      subtext: "Determined not to be humiliated inside this house again."
    active_goals:
