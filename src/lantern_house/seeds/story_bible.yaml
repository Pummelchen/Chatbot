recap_examples:
  - window: 1h
    headline: "Lucía's claim turned the lobby into a fault line."
    what_changed:
      - "Lucía walked into Lantern House with a copied codicil and forced Amelia to defend authority instead of just managing it."
      - "Rafael stopped treating Hana's name like old weather and started reacting like the storm had returned."
    emotional_shifts:
      - "Amelia moved from functional control to visible strain."
      - "Ayu's cheerful energy started covering fear instead of just chaos."
    clues:
      - "The lantern-wing key suddenly mattered to more than one person."
      - "Hana's return made typhoon night feel active instead of historic."
    unresolved_questions:
      - "Is Lucía's codicil real?"
      - "Why did Hana choose tonight to come back?"
    loyalty_status: "Amelia and Rafael are aligned but brittle; Lucía is already pulling the room toward a legitimacy fight."
    romance_status: "Old heat between Amelia and Rafael sharpened, while Lucía and Arjun started watching each other too closely."
    watch_next: "Watch whether Amelia protects the house by lying harder or by letting one truth escape."
  - window: 12h
    headline: "Debt pressure made every personal crack more expensive."
    what_changed:
      - "Blackwake's paperwork moved from background threat to practical deadline."
      - "Arjun and Lucía built dangerous chemistry while circling the same missing record."
    emotional_shifts:
      - "Rafael's sarcasm started sounding like guilt."
      - "Hana stopped feeling like a ghost and started feeling like a witness."
    clues:
      - "The copied codicil and the missing registry copy may be parts of one ownership puzzle."
      - "The basement layout no longer feels trustworthy."
    unresolved_questions:
      - "How much of Blackwake's leverage is fabricated?"
      - "What exactly did Evelyn ask Hana to protect?"
    loyalty_status: "No stable camp exists; the house is operating on temporary pairings and tactical trust."
    romance_status: "Amelia and Rafael are one interruption away from honesty, and Arjun and Lucía are halfway to trouble already."
    watch_next: "Watch for a document challenge, a midnight search, or a confession that arrives one sentence too late."
  - window: 24h
    headline: "Lantern House survived the day, not the illusion."
    what_changed:
      - "The ownership fight, the debt story, and Evelyn's disappearance are now openly understood as the same wound."
      - "Hana's return shifted the house from nostalgia into accountability."
    emotional_shifts:
      - "Amelia's authority held, but at a higher emotional cost."
      - "Rafael and Hana moved closer to open collision while still protecting pieces of each other."
    clues:
      - "The lantern wing, the hidden archive route, and the copied codicil are now linked in conversation."
      - "Ren Akiyama's name surfaced as a possible future key to the deeper record trail."
    unresolved_questions:
      - "Who inside the house is still protecting the oldest lie?"
      - "Did Evelyn plan succession, disappearance, or both?"
    loyalty_status: "Trust is splintering into personal loyalties instead of house loyalty, and every alliance now has a private cost."
    romance_status: "No confession landed cleanly; every attraction now carries inheritance, guilt, or strategic risk."
    watch_next: "Watch for a late-night archive search, a family message that changes someone's priorities, or a betrayal framed as protection."
