title: Saltglass House
setting:
  premise: "Saltglass House is a fading seaside boarding house at the edge of an old harbor district. It survives on thin margins, stubborn rituals, and the emotional dependency of the people who refuse to leave."
  house_history:
    - "Saltglass House began as a customs clerk's residence built over forgotten storage tunnels beneath the cliff road."
    - "Twenty years ago Celeste Vale transformed it into a guesthouse known for taking in people who needed a last chance."
    - "Seven years ago, during a storm blackout, Celeste vanished after sending one unfinished voice note and locking the east wing herself."
    - "Since then the house has carried debts, rumors, and a legal cloud no one has fully untangled."
  unresolved_old_event: "Celeste Vale disappeared on the same night a debt ledger vanished, a registry page was torn out, and Luca Serrano fled town under suspicion."
  money_pressure: "Blackwake Finance is pressuring the house with repair invoices, ballooning interest, and a sale deadline that may be built on forged records."
initial_scene:
  scene_key: opening-night
  objective: "Hold the house together through a power flicker while an unexpected return threatens old loyalties."
  location_slug: front-desk
  emotional_temperature: 6
  mystery_pressure: 7
  romance_pressure: 6
  comedic_pressure: 4
locations:
  - slug: front-desk
    name: Front Desk
    description: "A narrow check-in counter facing the lobby, with a brass bell that sticks in damp weather and drawers full of unpaid invoices."
    public_facts:
      - "Guests hear everything from the front desk."
      - "The old bell only rings cleanly when someone is lying calmly."
  - slug: salt-kitchen
    name: Salt Kitchen
    description: "A warm but cramped kitchen where gossip, rationing, and near-confessions collect around the stove."
    public_facts:
      - "The tea tin hides spare keys more often than tea."
      - "Everyone has cried in this kitchen and denied it later."
  - slug: east-wing
    name: Sealed East Wing
    description: "The cordoned wing Celeste locked before vanishing, still smelling faintly of old paper, rain rot, and varnish."
    public_facts:
      - "No one admits to hearing footsteps there."
      - "The east-wing hallway distorts voices at night."
  - slug: roof-walk
    name: Roof Walk
    description: "A narrow roof path above the sea wall where private calls, cigarettes, and dangerous honesty happen after midnight."
    public_facts:
      - "Storms make the roof rails sing."
      - "The roof sees more confessions than the chapel across the street."
  - slug: boiler-room
    name: Boiler Room
    description: "A basement service room with humming pipes, patched brick, and one suspiciously newer wall."
    public_facts:
      - "The pipes knock in patterns people joke are warnings."
      - "Elias spends too much time here when he does not want to answer questions."
objects:
  - slug: brass-ledger-key
    name: Brass Ledger Key
    description: "A salt-tarnished key with a lighthouse stamp, rumored to open something smaller than a door and more dangerous than a safe."
    location_slug: front-desk
    significance: 8
  - slug: torn-registry-page
    name: Torn Registry Page
    description: "The missing guest entry sheet from the night Celeste vanished."
    location_slug: east-wing
    significance: 9
  - slug: red-toolbox
    name: Red Toolbox
    description: "Elias's dented metal toolbox, heavier than tools alone would explain."
    location_slug: boiler-room
    significance: 7
  - slug: voice-note-recorder
    name: Voice Note Recorder
    description: "A pocket recorder with a cracked casing and one unreleased final recording from Celeste."
    location_slug: front-desk
    significance: 10
canon_facts:
  - key: house-debt-real
    type: finance
    visibility: shared
    content: "Saltglass House is under immediate debt pressure and risks forced sale within weeks if no legal stay appears."
  - key: east-wing-locked
    type: mystery
    visibility: public
    content: "The east wing has been officially sealed since Celeste vanished."
  - key: celeste-missing
    type: mystery
    visibility: public
    content: "Celeste Vale vanished seven years ago during a storm blackout."
  - key: luca-return
    type: tension
    visibility: public
    content: "Luca Serrano's return reopens blame and old fear inside the house."
  - key: blackwake-pressure
    type: finance
    visibility: shared
    content: "Blackwake Finance is escalating pressure with documents that may not all be legitimate."
characters:
  - slug: mara
    full_name: Mara Dela Cruz
    public_persona: "The practical house manager who keeps the lights on, the bills staggered, and everyone else from falling apart in public."
    hidden_wound: "She heard Celeste's final panicked voice note and hid it because the message named someone Mara still wants to protect."
    long_term_desire: "Keep Saltglass House alive long enough to become a place that no longer depends on lies."
    private_fear: "If the full truth comes out, the house will die and Elias will never forgive her."
    message_style: "Clipped, observant, dry under pressure, rarely wastes words, tenderness leaks out when she is tired."
    ensemble_role: "House Manager"
    secrets_summary: "Knows more about Celeste's last night than anyone suspects."
    humor_style: "Deadpan understatement that lands hardest when everyone else is panicking."
    color: "bright_blue"
    current_location_slug: front-desk
    emotional_state:
      baseline: guarded
      current: stretched
      subtext: "Trying to outwork dread."
    active_goals:
      - "Survive Blackwake's deadline without losing the house."
      - "Keep Luca and Elias from exploding at each other."
      - "Control the narrative around Celeste's disappearance."
  - slug: elias
    full_name: Elias Roan
    public_persona: "The night handyman with a sarcastic mouth, perfect timing in a crisis, and the reputation of a man who knows where bodies would fit."
    hidden_wound: "He moved evidence out of the boiler room the night Celeste vanished and never learned whether he buried guilt or proof."
    long_term_desire: "Earn a future in the house that is not built on what he did for desperate people before he came here."
    private_fear: "Mara still trusts him for the wrong reason."
    message_style: "Sharp, lean, sardonic, flirts when cornered, turns suddenly sincere when someone is hurt."
    ensemble_role: "Night Handyman"
    secrets_summary: "Has protected Mara for years and may be protecting the wrong version of the past."
    humor_style: "Knife-edge sarcasm with surprising gentleness underneath."
    color: "gold3"
    current_location_slug: boiler-room
    emotional_state:
      baseline: controlled
      current: restless
      subtext: "One bad question away from anger."
    active_goals:
      - "Keep Mara standing."
      - "Find out why Luca came back now."
      - "Make sure no one opens the wrong wall in the boiler room."
  - slug: sora
    full_name: Sora Lin
    public_persona: "The long-term guest and charming writer who notices everything, says half of it aloud, and always sounds like an ally until the room gets quiet."
    hidden_wound: "She came to Saltglass House because her sister Hana stayed here under an alias just before vanishing from the city."
    long_term_desire: "Uncover the truth about Hana without losing the fragile attachments she has formed inside the house."
    private_fear: "If she falls in love here, she will stop asking the questions that matter."
    message_style: "Warm, intelligent, teasing when probing, emotionally precise, never fully casual."
    ensemble_role: "Long-Term Guest"
    secrets_summary: "Her residency story is mostly real, but not her reason for choosing this house."
    humor_style: "Soft baiting, elegant deflection, and jokes that leave a second meaning behind."
    color: "orchid"
    current_location_slug: roof-walk
    emotional_state:
      baseline: curious
      current: alert
      subtext: "Watching for names, dates, and flinches."
    active_goals:
      - "Trace Hana's final week."
      - "Get Julian talking about the estate records."
      - "Push Mara gently until the guard slips."
  - slug: julian
    full_name: Julian Vale
    public_persona: "The absent owner's family connection who arrives looking entitled, polished, and inconveniently official."
    hidden_wound: "He is nearly broke, emotionally unwanted by the Vale family, and terrified that saving the house is the only way to prove he deserves anything."
    long_term_desire: "Claim legal authority over the estate without becoming the villain everyone expects."
    private_fear: "There may be evidence that Celeste cut him out on purpose."
    message_style: "Controlled, polished, defensive under accusation, unexpectedly earnest when treated with kindness."
    ensemble_role: "Relative and Heir"
    secrets_summary: "He knows about a second codicil but has never seen the original."
    humor_style: "Self-aware privilege jokes and accidental sincerity."
    color: "spring_green3"
    current_location_slug: front-desk
    emotional_state:
      baseline: composed
      current: embarrassed
      subtext: "Trying not to look like he needs this place."
    active_goals:
      - "Secure access to Celeste's office and records."
      - "Convince Mara he is not Blackwake's puppet."
      - "Hide how desperate his finances actually are."
  - slug: nia
    full_name: Nia Mercado
    public_persona: "The young front-desk helper who turns chaos into jokes, collects gossip like weather, and keeps strangers from realizing how tense the house really is."
    hidden_wound: "She is terrified that if she stops being useful, she will become temporary everywhere again."
    long_term_desire: "Belong here so completely that no one can imagine the house without her."
    private_fear: "One day the adults she depends on will choose secrets over her."
    message_style: "Fast, funny, impulsive, affectionate, openly reactive, often the most readable voice in the room."
    ensemble_role: "Young Worker"
    secrets_summary: "She found a key and kept it because being left out feels worse than being guilty."
    humor_style: "Chaotic warmth, tiny impressions, and weaponized honesty."
    color: "deep_pink3"
    current_location_slug: salt-kitchen
    emotional_state:
      baseline: bright
      current: overclocked
      subtext: "Joking to stay included."
    active_goals:
      - "Keep the house feeling alive online and in person."
      - "Figure out what Julian is hiding."
      - "Decide whether to tell Mara about the key."
  - slug: luca
    full_name: Luca Serrano
    public_persona: "The returning figure from the past whose smile says he has already measured every exit."
    hidden_wound: "He left town branded a thief, but he came back because Celeste may have disappeared while trying to clear his family from a debt they never owed."
    long_term_desire: "Recover the missing ledger and force the truth into daylight before Blackwake buries it."
    private_fear: "The house might be protecting the person who betrayed him."
    message_style: "Smooth, provocative, darkly funny, never fully still, shows real feeling in flashes he regrets."
    ensemble_role: "Returning Figure"
    secrets_summary: "His anger at the house is real, but so is the part of him that never stopped loving what it was."
    humor_style: "Provocation disguised as charm."
    color: "red3"
    current_location_slug: roof-walk
    emotional_state:
      baseline: wary
      current: charged
      subtext: "He came back ready for war and found unfinished love instead."
    active_goals:
      - "Force Mara to acknowledge what she hid."
      - "Find the ledger before Julian or Blackwake does."
      - "Test whether Elias is protector, accomplice, or obstacle."
