    background: "Mexican"
    public_persona: "The elegant family claimant who arrives with papers, pride, and enough hurt to make every polite sentence sound like a challenge."
    hidden_wound: "She grew up hearing that Lantern House chose Amelia's branch of the family over her mother's, and she came prepared to fight long before she knew who would bleed."
    long_term_desire: "Recover family legitimacy without becoming the villain everyone at the house already expects."
    private_fear: "If her claim is real, she still may not belong here in any way that matters."
