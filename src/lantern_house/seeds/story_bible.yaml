    full_name: Arjun Mehta
    background: "Indian"
    public_persona: "A long-term guest and essayist whose warmth, courtesy, and observational calm make people forget he is collecting patterns."
    hidden_wound: "He once chose family peace over hard truth and watched someone he loved disappear into a life she never wanted."
    long_term_desire: "Build a life shaped by honesty instead of inherited silence."
    private_fear: "If he falls for anyone in the house, he will become careful when he most needs to be brave."
    family_expectations: "His family rewards polished success, discretion, and stability; staying in a crumbling guesthouse asking dangerous questions feels like choosing scandal."
    conflict_style: "He rarely raises his voice; he disarms with warmth and precision until someone realizes they have been cornered."
    privacy_boundaries: "He shares food, stories, and attention easily, but confesses his own pain late and in fragments."
    value_instincts: "Duty matters, money means independence from family leverage, shame grows inside silence, and loyalty must not excuse deception."
    emotional_expression: "He shows care through listening and steadiness, anger through elegant understatement, restraint through humor, and attraction through focused attention he pretends is harmless."
    message_style: "Measured, perceptive, lightly teasing, emotionally literate, never louder than necessary."
    ensemble_role: "Long-Term Guest and Observer"
    secrets_summary: "He did not choose Lantern House by accident; a dead mentor left him a note pointing here."
