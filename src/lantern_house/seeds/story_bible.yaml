future_recurring_character:
  name: Ren Akiyama
  background: "Japanese"
  role: "Former Resident, Archivist, Mystery Link"
  function: "Later-stage arc expander tied to missing records, hidden truth, and the deeper history of the house."
  purpose: "Refreshes the mystery without replacing the core cast by bringing archive fragments, emotional history, and a new angle on Evelyn's final plans."
future_plot_hooks:
  - "Arjun's mother sends festival sweets and a marriage voice note on the same day Lucía asks him to hide a document."
  - "Ayu's aunt sees a guest's viral lobby clip and starts asking why Ayu looks frightened on camera."
  - "Rafael gets a family emergency call from Brazil just as Blackwake offers him private cash to step away from the house."
  - "Lucía's cousin arrives with church papers that complicate the Ortega version of family history."
  - "Hana receives a memorial food package from Seoul with a note proving someone has tracked her return."
  - "Amelia finds Evelyn's guestbook marked with coded symbols beside certain surnames."
  - "A blackout traps Amelia and Rafael in the records closet with one flashlight and one question neither can dodge."
  - "Ayu accidentally translates the wrong whispered conversation for the wrong guest."
  - "Arjun and Lucía get stranded on the late ferry with the copied codicil between them."
  - "Rafael cooks a staff meal from his mother's recipe card and Amelia recognizes handwriting on the back."
  - "A neighborhood shrine festival forces the house into cheerful public service while private loyalties crack backstage."
  - "Blackwake schedules a surprise inspection during Ayu's family video call."
  - "Lucía learns her mother lied about why the Ortega branch stopped coming to Lantern House."
  - "Arjun finds Ren Akiyama's name in an old donation ledger from the ferry archives."
  - "A guest livestreams a dinner argument and comment sections start picking sides between Amelia and Lucía."
  - "Rafael's old bandmate appears with a claim on the black cash box."
  - "Ayu gets offered a better-paying hotel job and tells no one for two days."
  - "Hana discovers Evelyn once paid for a surgery connected to her family through a shell account."
  - "Amelia and Rafael nearly kiss during storm prep in front of a still-recording security camera."
  - "Arjun is recognized by a family friend who can report his entire life back home."
  - "Lucía uncovers an immigration support letter that reveals a much softer side of Evelyn's choices."
  - "A typhoon anniversary memorial brings former residents back with conflicting memories of the same night."
  - "Ren Akiyama mails one annotated floor plan to the house, and one corner has been deliberately cut away."
  - "Blackwake offers Hana a silence agreement she once would have signed without blinking."
initial_trust_map:
  - "Amelia trusts Rafael and Ayu most in practice, but trusts Arjun's judgment more than she wants to admit."
  - "Rafael trusts Amelia emotionally, Ayu instinctively, and almost no one else."
  - "Arjun trusts nobody fully, but he feels safest with Ayu and most intrigued by Lucía."
  - "Lucía wants Amelia's cooperation, Arjun's attention, and proof that Hana is lying."
  - "Hana trusts almost no one, though she still reacts to Rafael and Amelia like unfinished history."
initial_romantic_tensions:
  - "Amelia and Rafael carry years of unfinished devotion, resentment, and near-confessions."
  - "Arjun and Lucía are pulled toward each other by intelligence, friction, and mutual danger."
  - "Rafael and Lucía have spark-heavy antagonism that could turn strategic or reckless."
  - "Hana's return destabilizes Amelia and Rafael because both once chose the house over telling her the truth."
  - "Ayu notices everyone else's romantic bad decisions early and occasionally makes them worse."
