story_arcs:
  - slug: vanished-owner
    title: "The Vanishing of Celeste Vale"
    status: active
    arc_type: central-mystery
    summary: "The house still lives inside the blast radius of Celeste's disappearance."
    stage_index: 0
    pressure_score: 10
    payoff_window: "months to years"
    reveal_ladder:
      - "A personal object resurfaces."
      - "The missing registry page is partially reconstructed."
      - "The voice note leaks one fragment."
      - "The tunnel is confirmed."
      - "Someone admits they lied about the storm night."
    unresolved_questions:
      - "Who was Celeste afraid of in her last hour?"
      - "Why was the east wing locked from inside?"
      - "What happened in the tunnel beneath the boiler room?"
  - slug: blackwake-pressure
    title: "The Sale Deadline"
    status: active
    arc_type: finance
    summary: "Debt pressure forces characters into risky alliances and timed decisions."
    stage_index: 0
    pressure_score: 9
    payoff_window: "weeks to months"
    reveal_ladder:
      - "A due notice lands in public view."
      - "A suspicious invoice is challenged."
      - "An old payment route links Blackwake to Luca."
      - "Forgery is strongly implied."
    unresolved_questions:
      - "How much of the debt is real?"
      - "Who benefits if Saltglass House collapses fast?"
  - slug: fault-lines-of-love
    title: "Fault Lines of Love"
    status: active
    arc_type: romance
    summary: "Old feelings and new attractions keep scrambling the truth economy of the house."
    stage_index: 0
    pressure_score: 8
    payoff_window: "continuous"
    reveal_ladder:
      - "Mara and Elias crack in private."
      - "Sora and Julian weaponize attraction."
      - "Luca reopens old hurt in Mara."
      - "A confession is interrupted."
    unresolved_questions:
      - "Can Mara choose honesty without destroying what she built with Elias?"
      - "Is Sora using Julian, or falling for him?"
  - slug: hidden-ledger
    title: "The Second Ledger"
    status: active
    arc_type: mystery
    summary: "The missing ledger could explain the debt, the betrayal, and who had motive to silence Celeste."
    stage_index: 0
    pressure_score: 9
    payoff_window: "months"
    reveal_ladder:
      - "The brass key matters."
      - "A guest alias on the torn page matches Hana."
      - "The ledger's cover location is narrowed."
      - "The wrong person finds the wrong piece first."
    unresolved_questions:
      - "Where is the second ledger now?"
      - "Did Celeste hide it or try to expose it?"
future_plot_hooks:
  - "A celebrity travel vlogger accidentally books the wrong room and starts streaming from the lobby."
  - "A blackout traps Mara and Luca in the records room."
  - "Nia discovers a guest has been paying in old cash notes that match Blackwake envelopes."
  - "Julian receives a legal threat that mentions a codicil no one else should know exists."
  - "Sora finds Hana's handwriting in the kitchen recipe book."
  - "Elias gets into a fight offsite and returns with a split lip and no explanation."
  - "A storm surge forces everyone to move boxes out of the boiler room wall."
  - "The chapel across the street rings bells during a false fire alarm."
  - "A former guest returns with a baby photo taken in Celeste's office."
  - "The roof rail breaks during an argument."
  - "A sealed invoice packet arrives addressed to Luca."
  - "Nia uses the key alone and sees something she misunderstands."
  - "Julian and Sora almost kiss while searching estate boxes."
  - "Mara finds evidence that Celeste was planning to disappear, or wanted people to think so."
  - "A police officer who knew Luca in the old days checks in as a paying guest."
  - "Someone starts leaving anonymous notes in the tea tin."
  - "The torn registry page resurfaces with one name burned away."
  - "Blackwake offers Julian a private deal to sell without contest."
  - "Elias admits he once lied to Mara about where he was during the storm."
  - "A tunnel draft carries music from somewhere that should be sealed."
initial_trust_map:
  - "Mara trusts Elias most and Luca least."
  - "Nia trusts Mara, Elias, and Sora more than Julian or Luca."
  - "Julian wants Mara's approval and Sora's attention, but trusts neither fully."
  - "Sora is drawn to Julian yet suspects nearly everyone."
  - "Luca trusts almost no one, but reads Mara more softly than he wants to."
initial_romantic_tensions:
  - "Mara and Elias carry a years-long near-love held together by emergency and avoidance."
  - "Mara and Luca have unfinished heat tangled with betrayal."
  - "Sora and Julian are in a flirtation built from curiosity, leverage, and real chemistry."
  - "Nia occasionally stirs romantic trouble just to see what people deny."
first_week_arc_plan:
  - day: 1
    beat: "Luca returns, Blackwake pressure sharpens, and Nia nearly reveals the key."
  - day: 2
    beat: "Sora confirms Hana's alias on a partial registry fragment."
  - day: 3
    beat: "Julian produces paperwork that helps the house and makes Mara mistrust him more."
  - day: 4
    beat: "A boiler-room incident suggests Elias is hiding access to something structural."
  - day: 5
    beat: "Mara and Elias nearly confess what they remember about the storm, but Luca interrupts."
  - day: 6
    beat: "Nia opens the east wing alone and misreads what she sees."
  - day: 7
    beat: "The voice note leaks one sentence that changes the suspect list."
first_24h_drama_plan:
  - hour_block: "00-01"
    focus: "Luca's return and the house's immediate emotional shock."
  - hour_block: "01-06"
    focus: "Sniping, testing loyalties, and the first Blackwake pressure point."
  - hour_block: "06-12"
    focus: "Kitchen humor and gossip give way to Sora probing Julian."
  - hour_block: "12-18"
    focus: "A small clue around the brass key shifts suspicion."
  - hour_block: "18-24"
    focus: "A near-confession between Mara and Elias ends with a new unresolved question."
recap_examples:
  - window: 1h
    headline: "Luca's return cracks the surface calm."
    what_changed:
      - "Luca walked back into Saltglass House and immediately forced Mara and Elias into defensive positions."
      - "Julian discovered Blackwake's pressure is faster and uglier than he expected."
    emotional_shifts:
      - "Mara moved from strained control to visible alarm."
      - "Elias shifted from sarcasm to territorial protection."
    clues:
      - "Talk of the red toolbox resurfaced."
      - "Nia reacted too strongly when keys came up."
    unresolved_questions:
      - "Why did Luca choose tonight to return?"
      - "What is Nia hiding about the east wing?"
    loyalty_status: "Mara and Elias are aligned but brittle; Sora is floating between camps."
    romance_status: "Old heat between Mara and Luca reopened the room; Mara and Elias got even less honest."
    watch_next: "Watch whether Julian sides with Mara or uses the chaos to push into Celeste's records."
  - window: 12h
    headline: "Charm, debt, and suspicion all deepened."
    what_changed:
      - "Sora and Julian built dangerous chemistry while circling estate secrets."
      - "Blackwake's paperwork became the practical threat beneath every emotional fight."
    emotional_shifts:
      - "Nia's comic energy turned into fear of exclusion."
      - "Luca stopped performing detachment every time Mara looked at him too long."
    clues:
      - "A reference to Hana's alias appeared."
      - "The brass ledger key became more than a rumor."
    unresolved_questions:
      - "How much of the debt is fake?"
      - "Who removed the registry page after Celeste vanished?"
    loyalty_status: "No stable camp exists; the house is operating on temporary pairings."
    romance_status: "Sora and Julian are heating up while Mara's old triangle turns corrosive."
    watch_next: "Watch for the first concrete document that links Blackwake to the storm night."
  - window: 24h
    headline: "The house survived the day, not the illusion."
    what_changed:
      - "Saltglass House is now openly in crisis rather than privately in denial."
      - "Multiple characters now understand that Celeste's disappearance and the debt are one story."
    emotional_shifts:
      - "Mara's authority held, but at higher emotional cost."
      - "Elias and Luca moved closer to open collision."
    clues:
      - "The missing ledger and the sealed tunnel are now linked in conversation."
      - "Julian's knowledge of estate irregularities is no longer entirely hidden."
    unresolved_questions:
      - "What did Celeste try to hide in the east wing?"
      - "Who inside the house is still protecting the oldest lie?"
    loyalty_status: "Trust is splintering into personal loyalties instead of house loyalty."
    romance_status: "No confession landed cleanly; every attraction now carries strategic risk."
    watch_next: "Watch for a midnight search, a document leak, or a betrayal framed as protection."
