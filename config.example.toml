# Lantern House core instruction: stay fail-safe, never leak debug or error text into the live chat, log recovered failures to logs/error.txt with context, and preserve hot-patch compatibility for uninterrupted long-running operation.
[database]
url = "mysql+pymysql://root:password@127.0.0.1:3306/lantern_house"
echo = false

[ollama]
base_url = "http://127.0.0.1:11434"
request_timeout_seconds = 90
keep_alive = "30m"
auto_pull = false
warm_on_start = true
max_retries = 3

[models]
character = "gemma3:1b"
repair = "gemma3:1b"
manager = "gemma3:4b"
announcer = "gemma3:4b"
god_ai = "gemma3:12b"

[runtime]
active_character_min = 2
active_character_max = 4
manager_step_interval_messages = 4
manager_prefetch_threshold_messages = 2
checkpoint_interval_seconds = 60
periodic_flush_messages = 1
degraded_mode_on_model_failure = true
healthcheck_interval_seconds = 60

[timing]
min_delay_seconds = 1.0
max_delay_seconds = 3.0
burst_probability = 0.18
burst_min_delay_seconds = 0.6
burst_max_delay_seconds = 1.3
lull_probability = 0.12
lull_min_delay_seconds = 3.1
lull_max_delay_seconds = 5.0

[thought_pulses]
hourly_budget = 2
cooldown_minutes = 20
dramatic_threshold = 7

[recaps]
enabled = true
windows = ["1h", "12h", "24h"]

[story]
title = "Lantern House"
# Use a packaged seed resource name or an absolute/relative local YAML path.
seed_file = "story_bible.yaml"
default_location_slug = "front-desk"

[logging]
level = "INFO"
directory = "logs"
file_name = "lantern_house.log"
error_file_name = "error.txt"
console_enabled = false

[audience]
update_file_path = "update.txt"
check_interval_minutes = 10

[viewer_signals]
enabled = true
source_file_path = "viewer_signals.yaml"
harvest_directory_path = "youtube_signals"
comments_file_name = "comments.jsonl"
clips_file_name = "clips.jsonl"
retention_file_name = "retention.jsonl"
live_chat_file_name = "live_chat.jsonl"
check_interval_minutes = 10
max_active_signals = 12
max_derived_signals = 8

[youtube_adapter]
enabled = true
refresh_interval_minutes = 10
max_records_per_file = 400
max_theme_items = 6
clip_spike_threshold = 75
retention_drop_threshold = 12

[house_pressure]
enabled = true
refresh_interval_minutes = 5
max_active_signals = 4
max_pending_beats = 4

[story_gravity]
enabled = true
refresh_interval_minutes = 10

[critic]
enabled = true
repair_threshold = 58
hard_fail_threshold = 34

[god_ai]
enabled = true
refresh_interval_minutes = 20
max_brief_age_minutes = 90
simulation_horizon_hours = 24
simulation_turns_per_hour = 90

[simulation]
default_horizon_hours = 24
default_turns_per_hour = 90

[hourly_beat_ledger]
enabled = true
meaningful_significance_threshold = 6
refresh_every_turn = true
enforce_progression_window_hours = 1

[programming_grid]
enabled = true
refresh_interval_minutes = 15
at_risk_after_hours = 12
weekly_at_risk_after_days = 4

[season_planner]
enabled = true
refresh_interval_minutes = 30
near_term_horizon_days = 30
long_term_horizon_days = 90

[chronology_graph]
enabled = true
refresh_interval_minutes = 10
recent_fact_hours = 24
contradiction_window_minutes = 180
max_digest_edges = 10

[canon]
enabled = true
windows = ["1h", "6h", "24h", "7d", "30d"]
max_items_per_section = 4

[canon_court]
enabled = true
max_findings_per_turn = 4
force_repair_on_block = true

[highlights]
enabled = true
clip_threshold = 7
quote_threshold = 7
max_recent_packages = 8

[world_tracking]
enabled = true
refresh_every_turn = true
max_recent_facts = 12
max_room_occupants = 4
money_deadline_hours = 72

[voice_fingerprints]
enabled = true
refresh_interval_minutes = 20
recent_messages_per_character = 8
lexical_marker_count = 5

[turn_selection]
enabled = true
candidate_count = 2
minimum_importance_score = 7
enable_under_high_load = false

[monetization]
enabled = true
min_package_score = 70
max_recent_packages = 8
min_clip_seconds = 15
max_clip_seconds = 55

[broadcast_assets]
enabled = true
min_asset_score = 72
max_recent_assets = 10

[guest_circulation]
enabled = true
refresh_interval_minutes = 20
max_active_guests = 4
max_pending_guest_beats = 3

[soak_audit]
enabled = true
horizons_hours = [24, 72, 168]
turns_per_hour = 90
refresh_interval_minutes = 30
max_recent_runs = 6

[failsafe]
enabled = true
base_retry_delay_seconds = 2
max_retry_delay_seconds = 300
max_consecutive_failures_before_pause = 2
keep_last_good_value = true
unexpected_iteration_delay_seconds = 3

[hot_patch]
enabled = true
check_interval_seconds = 15
shadow_validate = true
shadow_check_timeout_seconds = 45
# The runtime also auto-adds the active config file, .env, and the resolved
# audience steering, viewer-signal YAML, and YouTube-signal harvest paths to the
# watched set at startup.
watch_paths = ["src/lantern_house", "config.example.toml", "update.txt"]
watch_extensions = [".py", ".md", ".toml", ".yaml", ".yml", ".txt"]

[load_orchestration]
enabled = true
high_latency_ms = 7000
critical_latency_ms = 15000
recent_message_window = 10
high_failure_streak = 2
critical_failure_streak = 4

[inference_governor]
enabled = true
low_timeout_seconds = 70
medium_timeout_seconds = 45
high_timeout_seconds = 24
critical_timeout_seconds = 12
role_timeout_multipliers = { character = 0.7, repair = 0.45, manager = 0.8, announcer = 0.75, god_ai = 1.35 }
base_retry_budget = { character = 2, repair = 1, manager = 2, announcer = 1, god_ai = 1 }
disable_roles_under_high = ["god_ai"]
disable_roles_under_critical = ["repair", "god_ai"]
prewarm_roles_when_low = ["character", "manager", "announcer"]

[daily_life]
enabled = true
refresh_interval_minutes = 15
horizon_hours = 12
max_active_slots = 12
max_pending_beats = 5

[payoff_debt]
enabled = true
refresh_interval_minutes = 10
max_active_debts = 12
max_pending_beats = 4
overdue_after_hours = 48

[shadow_replay]
enabled = true
recent_turn_limit = 5
compare_window_hours = 12
max_reported_regressions = 4

[ops_dashboard]
enabled = true
telemetry_interval_seconds = 30
stale_checkpoint_seconds = 150
stale_recap_minutes = 70
stale_strategy_minutes = 120
